conditioning:
  method: ps
  params:
    scale: 0.5

data:
  name: building
  root: data/
  image_dir: samples/DPM
  building_dir: buildings_complete

measurement:
  operator:
    name: inpainting
  mask_opt:
    mask_type: corner_box_random
    mask_ratio: 0.5
    image_size: 256
    margin: [0, 0]
    box_size: [128, 128]  # 四分之一图像尺寸

  noise:
    name: gaussian
    sigma: 0.05 
